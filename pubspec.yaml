name: vip_finance
description: Ctrl - Personal Finance Tracker
publish_to: 'none'
version: 5.0.0+50

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  google_fonts: ^6.2.1
  intl: ^0.19.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  flutter_native_splash: ^2.4.4
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.5
  # v3.0 — Analytics
  fl_chart: ^0.68.0
  # v3.0 — Home Screen Widget
  home_widget: ^0.6.0
  # v3.0 — OCR Receipt Scanner
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  # v3.0 — Local Notifications
  flutter_local_notifications: ^17.2.4
  # v5.0 — New
  http: ^1.2.0
  timezone: ^0.9.4
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

# ─── Launcher Icon Config ──────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/V5_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/V5_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/V5_icon.png
    - assets/onboarding_1.png
    - assets/onboarding_2.png
    - assets/onboarding_3.png

# ─── Native Splash Screen Config ───────────────────────────────────────────────
flutter_native_splash:
  color: "#000000"
  image: "assets/icon/V5_icon.png"
  android_12:
    image: "assets/icon/V5_icon.png"
    icon_background_color: "#000000"
    color: "#000000"
