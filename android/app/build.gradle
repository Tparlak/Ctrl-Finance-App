plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// ─── Keystore signing config ──────────────────────────────────────────────────
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.vip.vip_finance"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    // ─── Signing ─────────────────────────────────────────────────────────────
    signingConfigs {
        release {
            keyAlias     keystoreProperties['keyAlias']     ?: 'androiddebugkey'
            keyPassword  keystoreProperties['keyPassword']  ?: 'android'
            storeFile    keystoreProperties['storeFile']
                             ? file(keystoreProperties['storeFile'])
                             : file("${System.getenv('USERPROFILE')}\\.android\\debug.keystore")
            storePassword keystoreProperties['storePassword'] ?: 'android'
        }
    }

    defaultConfig {
        applicationId "com.vip.vip_finance"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }

    // ─── Rename output APK to Ctrl-v{versionName}.apk ─────────────────────
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            if (variant.buildType.name == "release") {
                outputFileName = "Ctrl-v${variant.versionName}.apk"
            }
        }
    }
}

flutter {
    source '../..'
}

// ── Force-pin conflicting androidx deps to versions compatible with AGP 8.3.0 ─
configurations.all {
    resolutionStrategy {
        force 'androidx.browser:browser:1.8.0'
        force 'androidx.core:core:1.15.0'
        force 'androidx.core:core-ktx:1.15.0'
    }
}
